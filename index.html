<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naveen | GitHub</title>
</head>
<script>
    function bg_changer(){
        var val = document.getElementById("btn").value;
        if (val=="☀️"){
            document.getElementById("btn").value = "🌑";
            document.body.style.backgroundColor = "rgb(255,255,255)";
            document.getElementById("btn").style.color = "rgb(12,12,12)";
            document.getElementById("btn").style.backgroundColor = "rgb(255,255,255)";
            document.getElementById("main-card").style.backgroundColor = "rgb(12,12,12)";
            document.getElementById("text").style.color = "rgb(255,255,255)";
            document.getElementById("text-area").style.backgroundColor = "rgb(12,12,12)";
            document.getElementById("text-area").style.color = "white";
        }
        else if(val=="🌑"){
            document.getElementById("btn").value = "☀️";
            document.body.style.backgroundColor = "rgb(12,12,12)";
            document.getElementById("btn").style.color = "rgb(255,255,255)";
            document.getElementById("btn").style.backgroundColor = "rgb(12,12,12)";
            document.getElementById("main-card").style.backgroundColor = "rgb(255,255,255)";
            document.getElementById("text").style.color = "rgb(12,12,12)";
            document.getElementById("text-area").style.backgroundColor = "rgb(255,255,255)";
            document.getElementById("text-area").style.color = "rgb(12,12,12)";
        }
    }
</script>
<style>
    *{
        font-family: 'roboto',sans-serif;
        font-weight: bold;
    }
    body{
        background-color: rgb(255,255,255);
    }
    #main-card{
        width: 90%;
        height: 90%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%,-50%);
        background-color: rgb(12, 12, 12);
        border: 5px solid green;
    }
    #btn{
        right: 1%;
        width: 40px;
        height: 40px;
        float: right;
        color: rgb(12, 12, 12);
        border: none;
        background-color: transparent;
        font-size: medium;
        cursor: pointer;
    }
    #btn:focus{
        border: none;
    }
    #text{
        position: absolute;
        top: 0%;
        left: 50%;
        transform: translate(-50%,-50%);
        justify-content: center;
        color: white;
    }
    #text-area{
        margin-top: 5%;
        align-items: center;
        background-color: rgb(12, 12, 12);
        color: rgb(255,255,255);
        border: none;
        width: 99.5%;
        height: 87.5%;
        font-size: x-large;
        padding: 3px;
    }
    #text-area:focus{
        outline: none;
    }
</style>
<body>
    <input type="button" value="🌑" onclick="bg_changer()" id="btn">
    <div id="main-card">
        <center><h1 id="text">E-Board</h1></center>
        <textarea name="text" id="text-area" cols="30" rows="10"></textarea>
    </div>

</body>
</html>
